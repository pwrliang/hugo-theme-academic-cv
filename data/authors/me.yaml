role: Ph.D. Candidate
bio: |
 I am Liang Geng, a Ph.D. candidate in the Department of Computer Science and Engineering at The Ohio State University. 
 My research focuses on **algorithm engineering**, specifically leveraging **NVIDIA RT Cores** to accelerate non-rendering workloads, 
 such as geospatial data processing.
 I am co-advised by [Prof. Xiaodong Zhang](https://xiaodongzhang1911.github.io/) and [Dr. Rubao Lee](https://rubaolee.github.io/), 
 and I maintain close research collaborations with [Prof. Yanfeng Zhang](http://faculty.neu.edu.cn/zhangyf/) 
 and [Dr. Hao Wang](https://sites.google.com/site/hwang121). 
 Prior to joining OSU, I was a Senior Engineer at **Alibaba DAMO Academy** under the supervision of 
 [Dr. Wenyuan Yu](https://scholar.google.com/citations?user=hqgtnngAAAAJ&hl=en), 
 where I developed GPU support for [libgrape-lite](https://github.com/alibaba/libgrape-lite).



